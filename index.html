<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>親子單字小書 v15.2</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #fdfaf5; --card-bg: #ffffff; --text-main: #4a4a4a;
            --primary: #8ac6d1; --primary-dark: #6eabb7; --secondary: #bbded6;
            --accent: #ffb6b9; --shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        body {
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 15px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 600px; }
        .card { background-color: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
        h1 { color: var(--primary-dark); text-align: center; font-size: 1.8rem; margin: 10px 0 5px 0; }
        #cloudStatus { text-align: center; font-size: 0.8rem; color: #888; margin-bottom: 20px; display: block; }
        h2 { border-left: 6px solid var(--secondary); padding-left: 10px; font-size: 1.3rem; }
        
        /* 單元列表 */
        .unit-item {
            background: white; padding: 20px; border-radius: 15px; margin-bottom: 12px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            border: 2px solid #eee; transition: 0.2s;
        }
        .unit-item:hover { border-color: var(--primary); background: var(--secondary); }

        /* 學習模式卡片 */
        .learn-card {
            background: white; border-radius: 20px; padding: 30px; text-align: center;
            box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid #eee;
        }
        .learn-en { font-size: 3rem; font-weight: bold; color: var(--primary-dark); margin-bottom: 5px; }
        .learn-pos { color: #888; font-size: 1.2rem; margin-bottom: 15px; }
        .learn-zh { font-size: 2rem; margin-bottom: 25px; }

        button {
            background-color: var(--primary); color: white; border: none;
            padding: 15px 25px; border-radius: 50px; cursor: pointer;
            font-weight: bold; font-size: 1.1rem; width: 100%; margin: 5px 0;
        }
        button.secondary { background-color: var(--secondary); color: #444; }
        button.danger { background-color: #f1f1f1; color: var(--accent); }

        /* 喇叭按鈕 */
        .btn-speak-big {
            background: var(--secondary); color: white; border: none;
            width: 70px; height: 70px; border-radius: 50%; font-size: 2rem;
            display: inline-flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 畫面層級 */
        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color); z-index: 999; display: none;
            flex-direction: column; align-items: center; padding: 20px; overflow-y: auto;
        }

        /* 測驗專用 */
        .quiz-zh { font-size: 3.5rem; font-weight: bold; margin-bottom: 30px; }
        .q-input {
            font-size: 2rem; text-align: center; border: none; border-radius: 15px;
            background: white; box-shadow: var(--shadow); padding: 15px; width: 100%; margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>親子單字小書 v15.2</h1>
    <span id="cloudStatus">☁️ 檢查中...</span>

    <div class="card">
        <h2>📂 選擇單元開始預習</h2>
        <div id="unitList">讀取中...</div>
    </div>

    <button onclick="toggleAdmin()" style="background:none; color:#bbb; font-size:0.8rem;">⚙️ 家長管理模式</button>
    
    <div id="adminArea" style="display:none; margin-top:20px;">
        <div class="card">
            <h3>🧩 匯入單元</h3>
            <input id="unitName" type="text" placeholder="名稱">
            <textarea id="manualText" placeholder="貼上文字..."></textarea>
            <button onclick="runManualParse()">解析並儲存</button>
        </div>
    </div>
</div>

<div id="learnArea" class="overlay">
    <div style="width:100%; max-width:500px; text-align:center;">
        <h2 id="learnUnitTitle" style="margin-bottom:20px;"></h2>
        <div id="learnProgress" style="color:#888; margin-bottom:10px;"></div>
        
        <div class="learn-card">
            <div id="learnEn" class="learn-en"></div>
            <div id="learnPos" class="learn-pos"></div>
            <div id="learnZh" class="learn-zh"></div>
            <button class="btn-speak-big" onclick="speakCurrentLearn()">🔊</button>
        </div>

        <div style="display:flex; gap:10px;">
            <button class="secondary" onclick="prevLearn()">上一個</button>
            <button class="secondary" onclick="nextLearn()">下一個</button>
        </div>
        
        <button style="margin-top:30px; background:var(--primary-dark);" onclick="startQuizFromLearn()">我準備好了，開始測驗！💪</button>
        <button style="background:none; color:#888;" onclick="closeOverlays()">返回列表</button>
    </div>
</div>

<div id="quizArea" class="overlay">
    <div style="width:100%; max-width:500px; text-align:center;">
        <div id="quizProgress" style="color:#888; margin-bottom:20px;"></div>
        <div id="quizZh" class="quiz-zh"></div>
        
        <div id="quizInputArea">
            <input type="text" id="ansEn" class="q-input" placeholder="輸入英文" autocomplete="off" autocapitalize="none">
            <input type="text" id="ansPos" class="q-input" style="font-size:1.2rem;" placeholder="詞性">
        </div>

        <div id="feedback" style="min-height:40px; font-weight:bold; color:var(--primary-dark);"></div>

        <div id="correctBox" style="display:none; background:white; border:4px solid var(--accent); border-radius:20px; padding:20px; margin:20px 0;">
            <div style="color:var(--accent); margin-bottom:10px;">正確答案：</div>
            <div id="actualAns" style="font-size:2rem; font-weight:bold;"></div>
            <button onclick="nextQuiz()">記住了</button>
        </div>

        <button id="submitBtn" onclick="checkAnswer()">送出答案</button>
    </div>
</div>

<div id="resultArea" class="overlay">
    <div style="text-align:center; margin-top:50px;">
        <h1 style="font-size:3rem;">🎉 太棒了！</h1>
        <div id="resRate" style="font-size:5rem; color:var(--primary-dark); font-weight:bold;"></div>
        <button onclick="closeOverlays()" style="margin-top:40px;">回到列表</button>
    </div>
</div>

<script>
// --- [請填入你的 Firebase Config] ---
const firebaseConfig = {
    apiKey: "AIzaSyDFi2cajmGW9jr7dLgdV00GE0WdDkYT7Kw",
  authDomain: "my-vocab-c69f4.firebaseapp.com",
  projectId: "my-vocab-c69f4",
  storageBucket: "my-vocab-c69f4.firebasestorage.app",
  messagingSenderId: "323452067288",
  appId: "1:323452067288:web:77710f40657830b79ca6ad",
  measurementId: "G-1CF7ZXPX01"
};

const MY_SYNC_PASSWORD = "1234"; 

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let units = [];
let activeIndex = null;
let learnIdx = 0;
let qState = { words: [], idx: 0, wrongWords: [] };

function speakText(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US'; utterance.rate = 0.8;
    window.speechSynthesis.speak(utterance);
}

async function loadFromCloud() {
    const statusEl = document.getElementById('cloudStatus');
    try {
        const snapshot = await db.collection("vocab_units").get();
        units = []; snapshot.forEach(doc => units.push(doc.data()));
        renderUnits();
        statusEl.innerText = `✅ 雲端已連線 (${units.length} 個單元)`;
    } catch (e) { statusEl.innerText = "❌ 連線失敗"; }
}

function renderUnits() {
    document.getElementById('unitList').innerHTML = units.map((u, i) => `
        <div class="unit-item" onclick="openLearn(${i})">
            <span style="font-size:1.2rem; font-weight:bold;">📘 ${u.name}</span>
            <span style="color:#888;">${u.words.length} 字 ➜</span>
        </div>
    `).join('');
}

// 【學習模式邏輯】
function openLearn(i) {
    activeIndex = i;
    learnIdx = 0;
    document.getElementById('learnArea').style.display = 'flex';
    document.getElementById('learnUnitTitle').innerText = units[i].name;
    showLearnWord();
}

function showLearnWord() {
    const w = units[activeIndex].words[learnIdx];
    document.getElementById('learnProgress').innerText = `學習進度：${learnIdx + 1} / ${units[activeIndex].words.length}`;
    document.getElementById('learnEn').innerText = w.en;
    document.getElementById('learnPos').innerText = `[ ${w.pos} ]`;
    document.getElementById('learnZh').innerText = w.zh;
    speakText(w.en);
}

function nextLearn() {
    if (learnIdx < units[activeIndex].words.length - 1) { learnIdx++; showLearnWord(); }
    else { alert("已經是最後一個囉！準備好可以開始測驗了。"); }
}

function prevLearn() {
    if (learnIdx > 0) { learnIdx--; showLearnWord(); }
}

function speakCurrentLearn() {
    speakText(units[activeIndex].words[learnIdx].en);
}

// 【測驗模式邏輯】
function startQuizFromLearn() {
    document.getElementById('learnArea').style.display = 'none';
    document.getElementById('quizArea').style.display = 'flex';
    qState.words = [...units[activeIndex].words].sort(() => Math.random() - 0.5);
    qState.idx = 0; qState.wrongWords = [];
    showQuizQuestion();
}

function showQuizQuestion() {
    const w = qState.words[qState.idx];
    document.getElementById('quizProgress').innerText = `測驗中：${qState.idx + 1} / ${qState.words.length}`;
    document.getElementById('quizZh').innerText = w.zh;
    document.getElementById('ansEn').value = ""; document.getElementById('ansPos').value = "";
    document.getElementById('feedback').innerText = "";
    document.getElementById('correctBox').style.display = 'none';
    document.getElementById('quizInputArea').style.display = 'block';
    document.getElementById('submitBtn').style.display = 'block';
}

function checkAnswer() {
    const w = qState.words[qState.idx];
    const en = document.getElementById('ansEn').value.trim().toLowerCase();
    const pos = document.getElementById('ansPos').value.trim().toLowerCase();
    if (en === w.en.toLowerCase() && pos === w.pos.toLowerCase()) {
        speakText(w.en);
        document.getElementById('feedback').innerText = "✓ 答對了！";
        setTimeout(nextQuiz, 1000);
    } else {
        qState.wrongWords.push(w);
        document.getElementById('quizInputArea').style.display = 'none';
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('correctBox').style.display = 'block';
        document.getElementById('actualAns').innerText = `${w.en} [${w.pos}]`;
        speakText(w.en);
    }
}

function nextQuiz() {
    qState.idx++;
    if (qState.idx >= qState.words.length) {
        document.getElementById('quizArea').style.display = 'none';
        document.getElementById('resultArea').style.display = 'flex';
        document.getElementById('resRate').innerText = Math.round(((qState.words.length - qState.wrongWords.length) / qState.words.length) * 100) + "%";
    } else { showQuizQuestion(); }
}

function closeOverlays() {
    document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
}

function toggleAdmin() {
    if(prompt("請輸入管理密碼：") === MY_SYNC_PASSWORD) {
        document.getElementById('adminArea').style.display = 'block';
    } else { alert("密碼錯誤"); }
}

async function runManualParse() {
    const text = document.getElementById('manualText').value;
    const name = document.getElementById('unitName').value;
    if(!text || !name) return;
    const words = [];
    text.split('\n').forEach(line => {
        const parts = line.split(/[–-]/);
        if (parts.length >= 2) {
            let en = parts[0].trim();
            let remain = parts.slice(1).join('-').trim();
            const posMatch = remain.match(/^([a-z\s\/\.\(\)]+)(?=\s|[\u4e00-\u9fa5])/i);
            let pos = "n", zh = remain;
            if (posMatch) { pos = posMatch[1].trim(); zh = remain.substring(posMatch[0].length).trim(); }
            if (en) words.push({ en, pos, zh });
        }
    });
    const newUnit = { name, words };
    await db.collection("vocab_units").doc(name).set(newUnit);
    alert("儲存成功！");
    location.reload();
}

document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        if (document.getElementById('quizArea').style.display === 'flex') {
            if (document.getElementById('correctBox').style.display === 'block') nextQuiz();
            else checkAnswer();
        }
    }
});

loadFromCloud();
</script>
</body>
</html>
