<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACES單字小書 v16.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #fdfaf5; --card-bg: #ffffff; --text-main: #4a4a4a;
            --primary: #8ac6d1; --primary-dark: #6eabb7; --secondary: #bbded6;
            --accent: #ffb6b9; --shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        body {
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 15px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 600px; }
        .card { background-color: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
        h1 { color: var(--primary-dark); text-align: center; font-size: 1.8rem; margin: 10px 0 5px 0; }
        #cloudStatus { text-align: center; font-size: 0.8rem; color: #888; margin-bottom: 20px; display: block; }
        
        .unit-item {
            background: white; padding: 18px; border-radius: 15px; margin-bottom: 10px;
            display: flex; flex-direction: column; border: 2px solid #eee; transition: 0.2s;
        }
        .unit-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; width: 100%; }
        .btn-leaderboard { background: none; border: none; color: var(--primary-dark); font-size: 0.85rem; cursor: pointer; text-decoration: underline; padding: 5px 0; width: fit-content; }

        input[type="text"], textarea {
            background-color: #f9f9f9; border: 2px solid #eee;
            padding: 12px; border-radius: 12px; width: 100%; box-sizing: border-box;
            font-size: 1rem; margin-bottom: 10px; outline: none;
        }
        button {
            background-color: var(--primary); color: white; border: none;
            padding: 15px; border-radius: 50px; cursor: pointer;
            font-weight: bold; font-size: 1.1rem; width: 100%; margin: 5px 0;
        }
        button.secondary { background-color: var(--secondary); color: #444; }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color); z-index: 999; display: none;
            flex-direction: column; align-items: center; padding: 20px; overflow-y: auto;
        }

        /* 英雄榜樣式 */
        .rank-table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 0.9rem; }
        .rank-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .rank-name { font-weight: bold; }
        .rank-score { text-align: right; color: var(--primary-dark); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>ACES單字小書 v16.0</h1>
    <span id="cloudStatus">☁️ 檢查中...</span>

    <div id="mainView">
        <div class="card">
            <h2 style="font-size: 1.2rem; border-left: 5px solid var(--secondary); padding-left: 10px;">📂 選擇單元</h2>
            <div id="unitList">載入中...</div>
        </div>
        <button onclick="toggleAdmin()" style="background:none; color:#bbb; font-size:0.8rem; border:none;">⚙️ 家長管理模式</button>
    </div>

    </div>

<div id="resultArea" class="overlay">
    <div style="width:100%; max-width:500px; text-align:center; padding-bottom: 50px;">
        <h1 style="font-size:2.5rem;">挑戰完成！🎉</h1>
        <div id="resRate" style="font-size:5rem; color:var(--primary-dark); font-weight:bold;"></div>
        
        <div id="saveRecordArea" class="card" style="margin-top:20px;">
            <h4>🏆 登錄英雄榜</h4>
            <input type="text" id="userName" placeholder="輸入你的名字 (如：小明)" style="text-align:center;">
            <button onclick="saveToLeaderboard()" id="saveBtn">儲存紀錄</button>
        </div>

        <div id="wrongListArea" style="text-align:left; background:white; padding:15px; border-radius:15px; border:2px solid var(--accent); display:none; margin-top:20px;">
            <h4 style="color:var(--accent); margin-top:0;">需要練習的單字：</h4>
            <div id="wrongList"></div>
        </div>
        
        <button onclick="closeOverlays()" style="margin-top:30px;">回單元列表</button>
    </div>
</div>

<div id="rankArea" class="overlay">
    <div style="width:100%; max-width:500px; text-align:center;">
        <h2 id="rankTitle">英雄榜</h2>
        <div id="rankContent" class="card">載入中...</div>
        <button onclick="closeOverlays()">關閉</button>
    </div>
</div>

<script>
// --- [❗ 請填入 Firebase Config ❗] ---
const firebaseConfig = {
    apiKey: "AIzaSyDFi2cajmGW9jr7dLgdV00GE0WdDkYT7Kw",
  authDomain: "my-vocab-c69f4.firebaseapp.com",
  projectId: "my-vocab-c69f4",
  storageBucket: "my-vocab-c69f4.firebasestorage.app",
  messagingSenderId: "323452067288",
  appId: "1:323452067288:web:77710f40657830b79ca6ad",
  measurementId: "G-1CF7ZXPX01"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let units = [];
let activeIdx = null;
let currentRate = 0;

// ... 讀取雲端與渲染單元列表 (更新版) ...
function renderAll() {
    document.getElementById('unitList').innerHTML = units.map((u, i) => `
        <div class="unit-item">
            <div class="unit-header" onclick="openLearn(${i})">
                <span style="font-size:1.1rem; font-weight:bold;">📘 ${u.name}</span>
                <span style="color:#888;">${u.words.length} 字 ➜</span>
            </div>
            <button class="btn-leaderboard" onclick="showLeaderboard('${u.name}')">🏆 查看英雄榜</button>
        </div>
    `).join('');
    // ... 管理模式渲染略 ...
}

// 結算與儲存英雄榜邏輯
function showFinalResult() {
    document.getElementById('quizArea').style.display='none';
    document.getElementById('resultArea').style.display='flex';
    
    const total = qState.words.length;
    currentRate = Math.round(((total - qState.wrongWords.length) / total) * 100);
    document.getElementById('resRate').innerText = currentRate + "%";
    document.getElementById('saveRecordArea').style.display = 'block';
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('saveBtn').innerText = "儲存紀錄";

    if(qState.wrongWords.length > 0) {
        document.getElementById('wrongListArea').style.display='block';
        document.getElementById('wrongList').innerHTML = qState.wrongWords.map(w => `<div><strong>${w.en}</strong> [${w.pos}] - ${w.zh}</div>`).join('');
    }
}

async function saveToLeaderboard() {
    const name = document.getElementById('userName').value.trim();
    if(!name) return alert("請輸入名字！");
    
    const unitName = units[activeIdx].name;
    const docRef = db.collection("leaderboard").doc(`${unitName}_${name}`);
    const saveBtn = document.getElementById('saveBtn');
    
    saveBtn.disabled = true;
    saveBtn.innerText = "儲存中...";

    try {
        const doc = await docRef.get();
        if (doc.exists) {
            const oldRate = doc.data().rate;
            if (currentRate > oldRate) {
                await docRef.update({ rate: currentRate, date: new Date() });
                alert("超越自我！最高分已更新！");
            } else {
                alert("這次沒超過最高分，繼續加油！");
            }
        } else {
            await docRef.set({ unit: unitName, name: name, rate: currentRate, date: new Date() });
            alert("成功登錄英雄榜！");
        }
        document.getElementById('saveRecordArea').style.display = 'none';
    } catch(e) { alert("儲存失敗"); saveBtn.disabled = false; }
}

async function showLeaderboard(unitName) {
    document.getElementById('rankArea').style.display = 'flex';
    document.getElementById('rankTitle').innerText = `${unitName} 英雄榜`;
    const content = document.getElementById('rankContent');
    content.innerHTML = "讀取中...";

    try {
        const snap = await db.collection("leaderboard")
            .where("unit", "==", unitName)
            .orderBy("rate", "desc").get();
            
        if(snap.empty) {
            content.innerHTML = "目前尚無紀錄，快來當第一個挑戰者！";
            return;
        }

        let html = '<table class="rank-table">';
        snap.forEach(doc => {
            const d = doc.data();
            html += `<tr><td class="rank-name">${d.name}</td><td class="rank-score">${d.rate}%</td></tr>`;
        });
        html += '</table>';
        content.innerHTML = html;
    } catch(e) { content.innerHTML = "讀取失敗，請確認資料庫權限。"; }
}

// ... 其餘核心邏輯 (speak, quiz, learn) 維持 v15.5 穩定版 ...
</script>
</body>
</html>
