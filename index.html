<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Vocab v14.2 - Secure Sync</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --forest-deep: #0a110a; --tech-neon: #00ff88; --tech-blue: #00d9ff; --danger: #ff4757; --text: #e0f0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--forest-deep); color: var(--text); margin: 0; padding: 20px; background-image: radial-gradient(circle at 50% 50%, #162a16 0%, #050a05 100%); min-height: 100vh; }
        .container { max-width: 900px; margin: auto; }
        .card { background: rgba(20, 40, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(0, 255, 136, 0.2); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        h1 { color: var(--tech-neon); margin: 0 0 20px 0; border-bottom: 1px solid #2d5a27; padding-bottom: 10px; }
        input, textarea { background: rgba(0,0,0,0.5); border: 1px solid #2d5a27; color: var(--tech-neon); padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; }
        button { background: #1b3d1b; color: var(--tech-neon); border: 1px solid var(--tech-neon); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px 0; }
        button:hover { background: var(--tech-neon); color: #0a110a; }
        .btn-speak { background: transparent; border: 1px solid var(--tech-blue); color: var(--tech-blue); padding: 4px 8px; font-size: 0.9rem; margin-left: 5px; border-radius: 5px;}
        .btn-speak:hover { background: var(--tech-blue); color: white; }
        .unit-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { color: var(--tech-neon); text-align: left; padding: 10px; border-bottom: 2px solid var(--tech-neon); }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #studyArea { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #050a05; z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .quiz-zh { font-size: 3rem; margin-bottom: 30px; color: #fff; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .quiz-inputs { display: flex; gap: 15px; margin-bottom: 20px; width: 100%; max-width: 600px; }
        .q-input-en { flex: 3; font-size: 1.8rem; text-align: center; border: none; border-bottom: 3px solid var(--tech-blue); background: transparent; color: var(--tech-blue); outline:none;}
        .q-input-pos { flex: 1.5; font-size: 1.8rem; text-align: center; border: none; border-bottom: 3px solid var(--tech-neon); background: transparent; color: var(--tech-neon); outline:none;}
        .correct-answer-box { background: rgba(255, 71, 87, 0.15); border: 1px solid var(--danger); padding: 20px; border-radius: 12px; margin: 20px 0; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🌳 Forest Vocab v14.2 <span id="cloudStatus" style="font-size:0.8rem; color:var(--tech-blue);">☁️ 雲端已連線</span></h1>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label>單元名稱</label>
                <input id="unitName" type="text" placeholder="Unit 58">
                <button onclick="runManualParse()" style="margin-top:10px; width:100%">🧩 匯入單字</button>
            </div>
            <div>
                <label>文字貼上區</label>
                <textarea id="manualText" style="height:80px" placeholder="貼上文字解析..."></textarea>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>📂 記憶庫</h2>
        <div id="unitList"></div>
    </div>

    <div id="mainEditor" class="card" style="display:none;">
        <h2 id="currentUnitTitle"></h2>
        <div style="margin-bottom:15px; display:flex; gap:10px;">
            <button onclick="saveToCloud()">🔒 同步雲端 (需密碼)</button>
            <button style="background:var(--tech-neon); color:black" onclick="startQuiz()">📝 開始挑戰</button>
        </div>
        <table>
            <thead><tr><th>英文 (點擊發音)</th><th>詞性</th><th>中文</th><th>操作</th></tr></thead>
            <tbody id="wordTable"></tbody>
        </table>
    </div>
</div>

<div id="studyArea">
    <div id="quizUI" style="text-align:center; width:100%; max-width:600px;">
        <div id="quizProgress" style="color:#666; margin-bottom:10px;"></div>
        <div id="quizZh" class="quiz-zh"></div>
        <div class="quiz-inputs" id="inputArea">
            <input type="text" id="ansEn" class="q-input-en" placeholder="英文" autocomplete="off">
            <input type="text" id="ansPos" class="q-input-pos" placeholder="詞性" autocomplete="off">
        </div>
        <div id="feedback" style="min-height:30px; margin:15px 0;"></div>
        <div id="correctBox" class="correct-answer-box">
            <div id="actualAns" style="font-size:1.6rem; color:white; margin-bottom:15px;"></div>
            <button onclick="nextQuestion()" style="background:var(--danger); border:none; color:white; width:100%;">我背好了</button>
        </div>
        <button id="submitBtn" onclick="checkAnswer()" style="width:100%; font-size:1.2rem;">送出 (Enter)</button>
    </div>
    <div id="resultUI" style="display:none; text-align:center; width:100%; max-width:600px;">
        <h1 style="color:var(--tech-blue)">測驗結束 📊</h1>
        <div id="resSummary" style="margin-bottom:20px;"></div>
        <div id="wrongItems" style="text-align:left; background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; max-height: 300px; overflow-y: auto;"></div>
        <button onclick="exitQuiz()" style="margin-top:30px; width:100%;">返回</button>
    </div>
</div>

<script>
// --- 1. Firebase 配置 (請保留你的原設定) ---
const firebaseConfig = {
    apiKey: "AIzaSyDFi2cajmGW9jr7dLgdV00GE0WdDkYT7Kw",
  authDomain: "my-vocab-c69f4.firebaseapp.com",
  projectId: "my-vocab-c69f4",
  storageBucket: "my-vocab-c69f4.firebasestorage.app",
  messagingSenderId: "323452067288",
  appId: "1:323452067288:web:77710f40657830b79ca6ad",
  measurementId: "G-1CF7ZXPX01"
};

// --- 2. 同步密碼設定 ---
const MY_SYNC_PASSWORD = "1234"; 

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let units = JSON.parse(localStorage.getItem("forest_v14_data") || "[]");
let activeIndex = null;
let qState = { words: [], idx: 0, wrongWords: [] };

function speakText(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
}

async function loadFromCloud() {
    try {
        const snapshot = await db.collection("vocab_units").get();
        const cloudUnits = []; snapshot.forEach(doc => cloudUnits.push(doc.data()));
        if (cloudUnits.length > 0) { 
            units = cloudUnits; 
            localStorage.setItem("forest_v14_data", JSON.stringify(units)); 
            renderUnits(); 
        }
    } catch (e) { console.error("雲端載入失敗", e); }
}

async function saveToCloud() {
    if (activeIndex === null) return;

    // 密碼檢查邏輯
    const password = prompt("請輸入同步密碼以覆蓋雲端資料：");
    if (password !== MY_SYNC_PASSWORD) {
        alert("密碼錯誤，同步取消。");
        return;
    }

    const unit = units[activeIndex];
    document.getElementById('cloudStatus').innerText = "⏳ 同步中...";
    try {
        await db.collection("vocab_units").doc(unit.name).set(unit);
        localStorage.setItem("forest_v14_data", JSON.stringify(units));
        document.getElementById('cloudStatus').innerText = "✅ 雲端已同步";
        alert("雲端同步成功！");
    } catch (e) { 
        document.getElementById('cloudStatus').innerText = "❌ 同步失敗"; 
        alert("同步發生錯誤，請確認 Firebase 權限。");
    }
}

// 解析邏輯 (v12 修正版)
function parseTextLogic(text) {
    const words = [];
    text.split('\n').forEach(line => {
        let clean = line.replace(/^\d+[\.\s]*/, "").replace(/[﹩﹢％﹔﹕﹥﹤﹍﹉﹎﹊﹒﹙﹚〔〕〝〞ˊˇˋ˙]|[\u3105-\u3129]/g, "");
        const parts = clean.split(/[–-]/);
        if (parts.length >= 2) {
            let en = parts[0].trim();
            let remain = parts.slice(1).join('-').trim();
            const posRegex = /^([a-z\s\/\(\)\.]+)(?=\s|[\u4e00-\u9fa5])/i;
            const match = remain.match(posRegex);
            let pos = "n", zh = remain;
            if (match) { pos = match[1].trim(); zh = remain.substring(match[0].length).trim(); }
            if (en) words.push({ en, pos, zh });
        }
    });
    return words;
}

function runManualParse() {
    const text = document.getElementById('manualText').value;
    const name = document.getElementById('unitName').value || "新單元";
    if(!text) return;
    units.push({ name, words: parseTextLogic(text) });
    renderUnits();
    document.getElementById('manualText').value = "";
    activeIndex = units.length - 1;
    alert("本地已匯入，記得點擊『同步雲端』進行備份。");
}

function renderUnits() {
    document.getElementById('unitList').innerHTML = units.map((u, i) => `<div class="unit-item"><span onclick="openUnit(${i})" style="cursor:pointer">🌿 <strong>${u.name}</strong> (${u.words.length})</span><button class="danger" onclick="deleteUnit('${u.name}', ${i})">刪除</button></div>`).join('');
}

function openUnit(i) { activeIndex = i; document.getElementById('mainEditor').style.display = 'block'; document.getElementById('currentUnitTitle').innerText = units[i].name; renderTable(); }

function renderTable() {
    document.getElementById('wordTable').innerHTML = units[activeIndex].words.map((w, j) => `
        <tr>
            <td>
                <input type="text" value="${w.en}" onchange="units[activeIndex].words[${j}].en=this.value">
                <button class="btn-speak" onclick="speakText(units[activeIndex].words[${j}].en)">🔊</button>
            </td>
            <td><input type="text" value="${w.pos}" onchange="units[activeIndex].words[${j}].pos=this.value"></td>
            <td><input type="text" value="${w.zh}" onchange="units[activeIndex].words[${j}].zh=this.value"></td>
            <td><button class="danger" onclick="units[activeIndex].words.splice(${j},1);renderTable();">🗑️</button></td>
        </tr>
    `).join('');
}

async function deleteUnit(name, i) {
    const password = prompt("刪除單元也需要密碼：");
    if (password !== MY_SYNC_PASSWORD) return alert("密碼錯誤！");
    
    if(confirm("確定永久刪除雲端與本地的「" + name + "」？")) { 
        try { await db.collection("vocab_units").doc(name).delete(); } catch(e) {} 
        units.splice(i,1); 
        localStorage.setItem("forest_v14_data", JSON.stringify(units)); 
        renderUnits(); 
        document.getElementById('mainEditor').style.display='none'; 
    }
}

// 測驗邏輯
function startQuiz() { qState.words = [...units[activeIndex].words].sort(() => Math.random() - 0.5); qState.idx = 0; qState.wrongWords = []; document.getElementById('studyArea').style.display = 'flex'; document.getElementById('quizUI').style.display = 'block'; document.getElementById('resultUI').style.display = 'none'; showQuestion(); }

function showQuestion() { 
    const w = qState.words[qState.idx]; 
    document.getElementById('quizProgress').innerText = `STEP: ${qState.idx + 1} / ${qState.words.length}`; 
    document.getElementById('quizZh').innerText = w.zh; 
    document.getElementById('ansEn').value = ""; 
    document.getElementById('ansPos').value = ""; 
    document.getElementById('feedback').innerText = ""; 
    document.getElementById('correctBox').style.display = 'none'; 
    document.getElementById('inputArea').style.display = 'flex'; 
    document.getElementById('submitBtn').style.display = 'block'; 
    document.getElementById('ansEn').focus(); 
}

function checkAnswer() {
    const w = qState.words[qState.idx];
    const userEn = document.getElementById('ansEn').value.trim().toLowerCase();
    const userPos = document.getElementById('ansPos').value.trim().toLowerCase();
    
    if (userEn === w.en.toLowerCase() && userPos === w.pos.toLowerCase()) {
        speakText(w.en);
        document.getElementById('feedback').innerHTML = "<span style='color:var(--tech-neon)'>Correct! ✓</span>";
        setTimeout(() => { nextQuestion(); }, 800);
    } else {
        qState.wrongWords.push(w);
        document.getElementById('inputArea').style.display = 'none';
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('correctBox').style.display = 'block';
        document.getElementById('actualAns').innerHTML = `<span style="color:var(--danger)">錯誤！正確為：</span><br>${w.en} [${w.pos}]`;
        speakText(w.en);
    }
}

function nextQuestion() { qState.idx++; if (qState.idx >= qState.words.length) showFinalResult(); else showQuestion(); }

function showFinalResult() { 
    document.getElementById('quizUI').style.display = 'none'; 
    document.getElementById('resultUI').style.display = 'block'; 
    const total = qState.words.length; const wrong = qState.wrongWords.length;
    document.getElementById('resSummary').innerHTML = `<div style="font-size:1.5rem; color:var(--tech-neon)">正確率：${Math.round(((total-wrong)/total)*100)}%</div><div>錯題數：${wrong} / ${total}</div>`;
    document.getElementById('wrongItems').innerHTML = qState.wrongWords.map(w => `<div style='margin:10px 0;'><strong>${w.en}</strong> [${w.pos}] - ${w.zh} <button class="btn-speak" onclick="speakText('${w.en.replace(/'/g, "\\'")}')">🔊</button></div>`).join('');
}

function exitQuiz() { document.getElementById('studyArea').style.display = 'none'; }

document.addEventListener('keypress', (e) => { 
    if (e.key === 'Enter' && document.getElementById('studyArea').style.display === 'flex') { 
        if (document.getElementById('correctBox').style.display === 'block') nextQuestion(); 
        else if (document.getElementById('resultUI').style.display === 'none') checkAnswer(); 
    } 
});

loadFromCloud();
</script>
</body>
</html>
