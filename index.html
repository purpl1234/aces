<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACES單字小書 v16.1</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #fdfaf5; --card-bg: #ffffff; --text-main: #4a4a4a;
            --primary: #8ac6d1; --primary-dark: #6eabb7; --secondary: #bbded6;
            --accent: #ffb6b9; --shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        body {
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 15px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 600px; }
        .card { background-color: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
        h1 { color: var(--primary-dark); text-align: center; font-size: 1.8rem; margin: 10px 0 5px 0; }
        #cloudStatus { text-align: center; font-size: 0.8rem; color: #888; margin-bottom: 20px; display: block; }
        
        /* 列表樣式 */
        .unit-item {
            background: white; padding: 15px 20px; border-radius: 15px; margin-bottom: 12px;
            border: 2px solid #eee; display: flex; flex-direction: column;
        }
        .unit-main { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .btn-rank { background: none; border: none; color: var(--primary-dark); font-size: 0.85rem; cursor: pointer; text-decoration: underline; padding: 5px 0; width: fit-content; margin-top: 5px; }

        /* 輸入框與按鈕 */
        input[type="text"], textarea {
            background-color: #f9f9f9; border: 2px solid #eee;
            padding: 12px; border-radius: 12px; width: 100%; box-sizing: border-box;
            font-size: 1.1rem; margin-bottom: 10px; outline: none;
        }
        button {
            background-color: var(--primary); color: white; border: none;
            padding: 15px; border-radius: 50px; cursor: pointer;
            font-weight: bold; font-size: 1.1rem; width: 100%; margin: 5px 0;
        }
        button.secondary { background-color: var(--secondary); color: #444; }
        button.save { background-color: var(--primary-dark); }
        button.danger { background-color: #f1f1f1; color: var(--accent); }

        /* 覆蓋層 */
        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color); z-index: 999; display: none;
            flex-direction: column; align-items: center; padding: 20px; overflow-y: auto;
        }

        /* 英雄榜表格 */
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .rank-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .rank-name { font-weight: bold; text-align: left; }
        .rank-score { text-align: right; color: var(--primary-dark); font-weight: bold; font-size: 1.1rem; }

        /* 管理模式內容 */
        .admin-section { display: none; width: 100%; border-top: 2px dashed #ccc; padding-top: 20px; margin-top: 20px; }
        .word-edit-card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ACES單字小書 v16.1</h1>
    <div id="cloudStatus">☁️ 雲端連線中...</div>

    <div id="mainView">
        <div class="card">
            <h2 style="font-size: 1.2rem; border-left: 5px solid var(--secondary); padding-left: 10px;">📂 選擇單元挑戰</h2>
            <div id="unitList">讀取中...</div>
        </div>
        <button onclick="toggleAdmin()" style="background:none; color:#bbb; font-size:0.8rem; border:none; margin-top:10px;">⚙️ 家長管理模式</button>
    </div>

    <div id="adminArea" class="admin-section">
        <div class="card">
            <h3>🧩 1. 快速匯入新單元</h3>
            <input id="unitName" type="text" placeholder="單元名稱 (如 Unit 17)">
            <textarea id="manualText" style="height:100px" placeholder="貼上 AI 整理好的內容..."></textarea>
            <button onclick="runManualParse()">解析並加入列表</button>
        </div>

        <div id="editorView" class="card" style="display:none;">
            <h3 id="editTitle">編輯單元</h3>
            <div id="wordEditorList"></div>
            <button class="save" onclick="saveToCloud()">🔒 儲存變更至雲端</button>
            <button class="danger" onclick="deleteCurrentUnit()">🗑️ 刪除整個單元</button>
            <button onclick="closeEditor()" style="background:#eee; color:#666;">關閉編輯器</button>
        </div>
        
        <div class="card">
            <h3>📂 2. 現有單元管理</h3>
            <div id="adminUnitList"></div>
        </div>
    </div>
</div>

<div id="learnArea" class="overlay">
    <div style="width:100%; max-width:500px; text-align:center;">
        <h2 id="learnUnitTitle"></h2>
        <div id="learnProgress" style="color:#888;"></div>
        <div class="card" style="margin:20px 0; border:1px solid #eee;">
            <div id="learnEn" style="font-size:3rem; font-weight:bold; color:var(--primary-dark);"></div>
            <div id="learnPos" style="color:#888; font-size:1.2rem; margin-bottom:10px;"></div>
            <div id="learnZh" style="font-size:2rem; margin-bottom:20px;"></div>
            <button onclick="speakCurrent()" style="width:70px; height:70px; border-radius:50%; font-size:1.8rem;">🔊</button>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="secondary" onclick="prevLearn()">上一個</button>
            <button class="secondary" onclick="nextLearn()">下一個</button>
        </div>
        <button style="margin-top:30px; background:var(--primary-dark);" onclick="startQuiz()">我準備好了，開始測驗！💪</button>
        <button style="background:none; color:#888;" onclick="closeOverlays()">返回</button>
    </div>
</div>

<div id="quizArea" class="overlay">
    <div style="width:100%; max-width:500px; text-align:center;">
        <div id="quizProgress" style="color:#888;"></div>
        <div id="quizZh" style="font-size:3.5rem; font-weight:bold; margin:30px 0;"></div>
        <div id="quizInput">
            <input type="text" id="ansEn" style="font-size:2rem; text-align:center;" placeholder="輸入英文" autocomplete="off" autocapitalize="none">
            <input type="text" id="ansPos" style="font-size:1.2rem; text-align:center;" placeholder="詞性">
        </div>
        <div id="feedback" style="min-height:40px; font-weight:bold; color:var(--primary-dark); margin:10px 0;"></div>
        <div id="correctBox" style="display:none; background:white; border:4px solid var(--accent); border-radius:20px; padding:20px;">
            <div id="actualAns" style="font-size:2rem; font-weight:bold;"></div>
            <button onclick="nextQuiz()">下一個</button>
        </div>
        <button id="submitBtn" onclick="checkAnswer()">送出答案</button>
    </div>
</div>

<div id="resultArea" class="overlay">
    <div style="width:100%; max-width:500px; text-align:center; padding-bottom: 50px;">
        <h1 style="font-size:2.5rem;">挑戰完成！🎉</h1>
        <div id="resRate" style="font-size:5rem; color:var(--primary-dark); font-weight:bold; margin-bottom:10px;"></div>
        
        <div id="saveRecordArea" class="card" style="border: 2px solid var(--primary);">
            <h4 style="margin-top:0;">🏆 登錄英雄榜</h4>
            <p style="font-size:0.8rem; color:#888;">每個單元僅會記錄你的最高分</p>
            <input type="text" id="userName" placeholder="輸入你的名字" style="text-align:center;">
            <button onclick="saveToLeaderboard()" id="saveBtn">確認儲存</button>
        </div>

        <div id="wrongListArea" style="text-align:left; background:white; padding:15px; border-radius:15px; border:1px solid var(--accent); display:none; margin-top:20px;">
            <h4 style="color:var(--accent); margin-top:0;">需要練習的單字：</h4>
            <div id="wrongList"></div>
        </div>
        
        <button onclick="closeOverlays()" style="margin-top:30px;">回單元列表</button>
    </div>
</div>

<div id="rankArea" class="overlay">
    <div style="width:100%; max-width:500px; text-align:center;">
        <h2 id="rankTitle">英雄榜</h2>
        <div id="rankContent" class="card">載入中...</div>
        <button onclick="closeOverlays()">關閉視窗</button>
    </div>
</div>

<script>
// --- [❗ 請更換為你的 Firebase Config ❗] ---
const firebaseConfig = {
  apiKey: "AIzaSyDFi2cajmGW9jr7dLgdV00GE0WdDkYT7Kw",
  authDomain: "my-vocab-c69f4.firebaseapp.com",
  projectId: "my-vocab-c69f4",
  storageBucket: "my-vocab-c69f4.firebasestorage.app",
  messagingSenderId: "323452067288",
  appId: "1:323452067288:web:77710f40657830b79ca6ad",
  measurementId: "G-1CF7ZXPX01"
};

const MY_SYNC_PASSWORD = "1234"; 

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let units = [];
let activeIdx = null;
let learnIdx = 0;
let qState = { words: [], idx: 0, wrongWords: [] };
let currentRate = 0;

function speakText(t) { 
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=0.8;
    window.speechSynthesis.speak(u);
}

// 載入資料
async function loadFromCloud() {
    const s = document.getElementById('cloudStatus');
    try {
        const snap = await db.collection("vocab_units").get();
        units = []; snap.forEach(doc => units.push(doc.data()));
        renderAll();
        s.innerText = `✅ 雲端連線正常 (${units.length} 單元)`;
    } catch(e) { s.innerText = "❌ 連線失敗"; }
}

function renderAll() {
    // 主列表
    document.getElementById('unitList').innerHTML = units.map((u, i) => `
        <div class="unit-item">
            <div class="unit-main" onclick="openLearn(${i})">
                <span style="font-size:1.1rem; font-weight:bold;">📘 ${u.name}</span>
                <span style="color:#888;">${u.words.length} 字 ➜</span>
            </div>
            <button class="btn-rank" onclick="showLeaderboard('${u.name.replace(/'/g, "\\'")}')">🏆 查看英雄榜</button>
        </div>
    `).join('');

    // 管理列表
    document.getElementById('adminUnitList').innerHTML = units.map((u, i) => `
        <div style="display:flex; justify-content:space-between; margin-bottom:8px; padding:10px; border:1px solid #eee; border-radius:10px;">
            <span>${u.name}</span>
            <button onclick="openEditor(${i})" style="width:auto; padding:5px 15px; font-size:0.8rem; margin:0;">編輯</button>
        </div>
    `).join('');
}

// 英雄榜儲存邏輯
async function saveToLeaderboard() {
    const name = document.getElementById('userName').value.trim();
    if(!name) return alert("請輸入名字");
    
    const unitName = units[activeIdx].name;
    const docId = `${unitName}_${name}`; // 每個名字在該單元只有一個 ID
    const docRef = db.collection("leaderboard").doc(docId);
    const btn = document.getElementById('saveBtn');
    
    btn.disabled = true; btn.innerText = "儲存中...";

    try {
        const doc = await docRef.get();
        if (doc.exists) {
            const oldRate = doc.data().rate;
            if (currentRate > oldRate) {
                await docRef.update({ rate: currentRate, date: new Date() });
                alert("太棒了！你刷新了自己的最高紀錄！");
            } else {
                alert(`你之前的最高紀錄是 ${oldRate}%，這次沒超過，繼續加油喔！`);
            }
        } else {
            await docRef.set({ unit: unitName, name: name, rate: currentRate, date: new Date() });
            alert("成功登錄英雄榜！");
        }
        document.getElementById('saveRecordArea').style.display = 'none';
    } catch(e) { alert("儲存失敗"); btn.disabled = false; }
}

// 顯示英雄榜
async function showLeaderboard(unitName) {
    document.getElementById('rankArea').style.display = 'flex';
    document.getElementById('rankTitle').innerText = `${unitName} 英雄榜`;
    const content = document.getElementById('rankContent');
    content.innerHTML = "讀取紀錄中...";

    try {
        const snap = await db.collection("leaderboard")
            .where("unit", "==", unitName)
            .orderBy("rate", "desc").limit(20).get();
            
        if(snap.empty) {
            content.innerHTML = "目前還沒有紀錄喔，快來挑戰！";
            return;
        }

        let html = '<table class="rank-table">';
        snap.forEach(doc => {
            const d = doc.data();
            html += `<tr><td class="rank-name">${d.name}</td><td class="rank-score">${d.rate}%</td></tr>`;
        });
        html += '</table>';
        content.innerHTML = html;
    } catch(e) { content.innerHTML = "讀取失敗，請檢查資料庫索引設定。"; }
}

// 測驗邏輯
function startQuiz() {
    document.getElementById('learnArea').style.display = 'none';
    document.getElementById('quizArea').style.display = 'flex';
    qState.words = [...units[activeIdx].words].sort(() => Math.random() - 0.5);
    qState.idx = 0; qState.wrongWords = [];
    showQ();
}
function checkAnswer() {
    const w = qState.words[qState.idx];
    const en = document.getElementById('ansEn').value.trim().toLowerCase();
    const pos = document.getElementById('ansPos').value.trim().toLowerCase();
    if(en === w.en.toLowerCase() && (pos === w.pos.toLowerCase() || w.pos === "")) {
        speakText(w.en); document.getElementById('feedback').innerText = "✓ 正確！";
        setTimeout(nextQuiz, 800);
    } else {
        qState.wrongWords.push(w);
        document.getElementById('quizInput').style.display='none';
        document.getElementById('submitBtn').style.display='none';
        document.getElementById('correctBox').style.display='block';
        document.getElementById('actualAns').innerText = `${w.en} [${w.pos}]`;
        speakText(w.en);
    }
}
function nextQuiz() {
    qState.idx++;
    if(qState.idx >= qState.words.length) {
        document.getElementById('quizArea').style.display='none';
        document.getElementById('resultArea').style.display='flex';
        currentRate = Math.round(((qState.words.length-qState.wrongWords.length)/qState.words.length)*100);
        document.getElementById('resRate').innerText = currentRate + "%";
        document.getElementById('saveRecordArea').style.display = 'block';
        if(qState.wrongWords.length > 0) {
            document.getElementById('wrongListArea').style.display='block';
            document.getElementById('wrongList').innerHTML = qState.wrongWords.map(w => `<div style="margin:8px 0; border-bottom:1px solid #eee;"><strong>${w.en}</strong> [${w.pos}]<br>${w.zh}</div>`).join('');
        } else {
            document.getElementById('wrongListArea').style.display='none';
        }
    } else showQ();
}

// 其他基礎功能
function openLearn(i) { activeIdx = i; learnIdx = 0; document.getElementById('learnArea').style.display='flex'; showL(); }
function showL() {
    const w = units[activeIdx].words[learnIdx];
    document.getElementById('learnUnitTitle').innerText = units[activeIdx].name;
    document.getElementById('learnProgress').innerText = `預習中：${learnIdx+1}/${units[activeIdx].words.length}`;
    document.getElementById('learnEn').innerText = w.en;
    document.getElementById('learnPos').innerText = `[${w.pos}]`;
    document.getElementById('learnZh').innerText = w.zh;
    speakText(w.en);
}
function nextLearn() { if(learnIdx < units[activeIdx].words.length-1) { learnIdx++; showL(); } }
function prevLearn() { if(learnIdx > 0) { learnIdx--; showL(); } }
function speakCurrent() { speakText(units[activeIdx].words[learnIdx].en); }
function showQ() {
    const w = qState.words[qState.idx];
    document.getElementById('quizProgress').innerText = `測驗中：${qState.idx+1}/${qState.words.length}`;
    document.getElementById('quizZh').innerText = w.zh;
    document.getElementById('ansEn').value = ""; document.getElementById('ansPos').value = "";
    document.getElementById('feedback').innerText = "";
    document.getElementById('correctBox').style.display = 'none';
    document.getElementById('quizInput').style.display = 'block';
    document.getElementById('submitBtn').style.display = 'block';
}

// 管理功能
function toggleAdmin() {
    const a = document.getElementById('adminArea');
    if(a.style.display === 'none' || a.style.display === '') {
        if(prompt("請輸入家長密碼：") === MY_SYNC_PASSWORD) a.style.display = 'block';
    } else a.style.display = 'none';
}
function openEditor(i) {
    activeIdx = i; document.getElementById('editorView').style.display = 'block';
    document.getElementById('editTitle').innerText = `編輯單元：${units[i].name}`;
    renderEditorItems();
}
function renderEditorItems() {
    document.getElementById('wordEditorList').innerHTML = units[activeIdx].words.map((w, j) => `
        <div class="word-edit-card">
            <input type="text" value="${w.en}" onchange="units[activeIdx].words[${j}].en=this.value">
            <input type="text" value="${w.pos}" onchange="units[activeIdx].words[${j}].pos=this.value">
            <input type="text" value="${w.zh}" onchange="units[activeIdx].words[${j}].zh=this.value">
            <button class="danger" onclick="units[activeIdx].words.splice(${j},1);renderEditorItems();" style="width:auto; padding:5px 15px; font-size:0.7rem;">刪除單字</button>
        </div>
    `).join('');
}
async function saveToCloud() {
    try {
        await db.collection("vocab_units").doc(units[activeIdx].name).set(units[activeIdx]);
        alert("雲端儲存成功！"); loadFromCloud();
    } catch(e) { alert("儲存失敗"); }
}
async function deleteCurrentUnit() {
    if(!confirm("確定要徹底刪除此單元嗎？")) return;
    await db.collection("vocab_units").doc(units[activeIdx].name).delete();
    location.reload();
}
function runManualParse() {
    const t = document.getElementById('manualText').value;
    const n = document.getElementById('unitName').value;
    if(!t || !n) return alert("請填寫單元名稱與內容");
    const ws = [];
    t.split('\n').forEach(line => {
        const parts = line.split(/[–-]/);
        if(parts.length >= 2) {
            let en = parts[0].trim();
            let rem = parts.slice(1).join('-').trim();
            const pm = rem.match(/^([a-z\s\/\.\(\)]+)(?=\s|[\u4e00-\u9fa5])/i);
            let pos = "n", zh = rem;
            if(pm) { pos = pm[1].trim(); zh = rem.substring(pm[0].length).trim(); }
            if(en) ws.push({ en, pos, zh });
        }
    });
    units.push({ name: n, words: ws });
    renderAll();
    alert("解析成功，請到下方點擊「編輯」並「儲存至雲端」");
}
function closeOverlays() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }
function closeEditor() { document.getElementById('editorView').style.display = 'none'; }

document.addEventListener('keypress', (e) => {
    if(e.key === 'Enter' && document.getElementById('quizArea').style.display === 'flex') {
        if(document.getElementById('correctBox').style.display === 'block') nextQuiz();
        else checkAnswer();
    }
});

loadFromCloud();
</script>
</body>
</html>
